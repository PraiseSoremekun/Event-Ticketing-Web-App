<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../admin/css/admindashboard1.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Quikpass-Event-Ticketing-App</title>
  </head>

  <body>
    <aside class="sidebar">
      <ul>
        <li class="listitem active">
          <a href="./admin.html">
            <img src="../asset/image/homedashborad.svg" alt="" />
            <span>Home</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./adminupload.html">
            <img src="../asset/image/uploaddashboard.svg" alt="" />
            <span>Upload Events</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./orders.html">
            <img src="../asset/image/orderdashboard.svg" alt="" />
            <span>Orders</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./admindasboard.html">
            <img src="../asset/image/eventsdashboard.svg" alt="" />
            <span>Events</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./admindashboard1.html">
            <img src="../asset/image/emaildashboard.svg" alt="" />
            <span>Newsletter</span>
          </a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="top">
          <h4>Newsletter</h4>
        </div>
        <div class="profile">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search here" class="here" />
          </div>
          <img src="../asset/image/profile.svg" alt="" />
        </div>
      </div>

      <div class="inputt">
        <textarea name="" id="" cols="137" rows="1" placeholder="Enter email title" class="email"></textarea>
        <br />
        <textarea
          name=""
          id=""
          cols="137"
          rows="20"
          placeholder="Enter email content here..."
          class="content"
        ></textarea>
      </div>

      <div class="send">
        <p><a href="">Send</a></p>
      </div>
    </main>
  </body>
</html>
