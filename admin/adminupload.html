<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../admin/css/adminupload.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Quikpass-Event-Ticketing-App</title>
  </head>
  <body>
    <aside class="sidebar">
      <ul>
        <li class="listitem active">
          <a href="./admin.html">
            <img src="../asset/image/homedashborad.svg" alt="" />
            <span>Home</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./adminupload.html">
            <img src="../asset/image/uploaddashboard.svg" alt="" />
            <span>Upload Events</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./orders.html">
            <img src="../asset/image/orderdashboard.svg" alt="" />
            <span>Orders</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./admindasboard.html">
            <img src="../asset/image/eventsdashboard.svg" alt="" />
            <span>Events</span>
          </a>
        </li>

        <li class="listitem">
          <a href="./admindashboard1.html">
            <img src="../asset/image/emaildashboard.svg" alt="" />
            <span>Newsletter</span>
          </a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <!-- topbar -->
      <div class="top-bar">
        <div class="top">
          <h4>Home</h4>
          <p>Welcome Chidinma</p>
        </div>
        <div class="profile">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search here" class="here" />
          </div>
          <img src="../asset/image/profile.svg" alt="" />
        </div>
      </div>

      <div class="long-input">
        <div class="inputt">
          <input type="text" placeholder="Enter event title" class="title" />
          <span>Title</span>
        </div>
        <div class="lp">
          <input
            type="text"
            placeholder="Enter event location"
            class="location"
          />
          <input type="number" placeholder="Enter event price" class="price" />
        </div>
        <input type="text" placeholder="Enter event time" class="time" />
      </div>

      <div class="hero-image">
        <h3>Hero Image</h3>
        <div class="hero-img">
          <img src="../asset/image/adminhero.svg" alt="" />
        </div>
      </div>

      <div class="description">
        <h3>Description</h3>
        <textarea
          name="description"
          placeholder="Enter event description here..."
          rows="8"
          cols="50"
          class="descrip"
        ></textarea>
      </div>

      <div class="ticket">
        <h3>Tickets</h3>
        <div>
          <div class="ticket1">
            <div class="ticket2">
              <h4>Ticket category</h4>
              <input type="text" placeholder="Enter apartmet type" />
            </div>
            <div class="ticket3">
              <h4>Ticket price</h4>
              <input type="number" placeholder="Enter ticket price" />
            </div>
          </div>

          <div class="ticket4">
            <h4>Benefits</h4>
            <input type="text" placeholder="Enter your text here" />
          </div>
        </div>

        <div class="plus">
          <img src="../asset/image/plus.svg" alt="" />
        </div>
      </div>

      <div class="thumbnails">
        <h3>Thumbnails</h3>
        <div class="thumbnailsimg">
          <div class="thumbimg">
            <img src="../asset/image/Thumbnails.svg" alt="" />
          </div>

          <div class="thumbimg">
            <img src="../asset/image/Thumbnails.svg" alt="" />
          </div>

          <div class="thumbimg">
            <img src="../asset/image/Thumbnails.svg" alt="" />
          </div>
        </div>
      </div>

      <div class="btn">
        <p class="btn1"><a href="">Preview</a></p>
        <p class="btn2"><a href="">Publish</a></p>
      </div>
    </main>
  </body>
</html>
