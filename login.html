<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Quikpass-Event-Ticketing-App</title>
  </head>
  <body>
    <header>
      <!-- navigation bar -->
      <div id="navbar">
        <a href="#"
          ><img src="./asset/image/Ellipse 1 (1).svg" alt="Quikpass Logo"
        /></a>
        <div class="navbar1">
          <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./events.html">Events</a></li>
            <li><a href="./contactus.html">Contact Us</a></li>
            <li><a href="./faqs.html">FAQ</a></li>
          </ul>
        </div>
        <div class="navbar2">
          <ul>
            <li><a href="./login.html" class="Log">LOGIN</a></li>
            <li><a href="./signup.html" class="sign">SignUp</a></li>
          </ul>
        </div>
      </div>
    </header>

    <!-- signup page -->
    <div class="signup">
      <div class="signup-img">
        <img src="./asset/image/loginimg.svg" alt="" />
      </div>
      <div class="signup-texts">
        <div class="sitexts">
          <h2>Welcome Back!</h2>
        </div>

        <div>
          <div class="input">
            <label for="Email">
              Email Address
              <br />
              <input type="email" placeholder="Email" class="inputt" />
            </label>
          </div>

          <div class="input">
            <label for="password">Enter Password</label>
            <br />
            <input type="password" placeholder="Password" class="inputt" />
          </div>

          <div class="remember-forget">
            <label class="remember">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forget-password">Forget Password</a>
          </div>
        </div>

        <div class="signbut">
          <a href="#">Log in </a>
        </div>

        <div class="divider-container">
          <div class="divider-text">Or log in with</div>
        </div>

        <div class="icon">
          <a href="" class="googlea">
            <div class="google">
              <i class="fa-brands fa-google"></i> <span>Google</span>
            </div>
          </a>

          <a href="" class="facebooka">
            <div class="facebook">
              <i class="fa-brands fa-facebook"></i> <span>Facebook</span>
            </div>
          </a>
        </div>

        <div class="account">
          <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
      </div>
    </div>
    <script src="./js/login.js"></script>
  </body>
</html>
