<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/welcome.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Quikpass-Event-Ticketing-App</title>
  </head>

  <body>
    <div class="container">
      <img src="./asset/image/Ellipse 1 (1).svg" alt="" />
      <h1>Welcome Back</h1>
      <p>Welcome back, please enter your details</p>

      <div class="log">
        <h5 class="in">Login</h5>
        <h5>Signup</h5>
      </div>

      <div class="email-container">
        <i class="fas fa-envelope email-icon"></i>

        <div class="divider"></div>

        <div class="email-content">
          <span class="email-label">Email Address</span>
          <span class="email-text">andeimmanuel@gmail.com</span>
        </div>

        <i class="fas fa-check-circle check-icon"></i>
      </div>

      <a href="#">Continue</a>

      <div class="divider-container">
        <div class="divider-text">or continue with</div>
      </div>
      
      <div class="social-icons">
        <div class="social-icon facebook">
          <i class="fab fa-facebook-f"></i>
        </div>
        <div class="social-icon apple">
          <i class="fab fa-apple"></i>
        </div>
        <div class="social-icon google">
          <i class="fab fa-google"></i>
        </div>
      </div>
    </div>
    <script src="./js/welcome.js"></script>
  </body>
</html>
